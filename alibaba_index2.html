<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿里巴巴 | 丝路漫行·帆影驼铃</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --gold-dark: #b8860b;
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-light: #f5f5f5;
            --text-muted: #a0a0a0;
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        /* 头部背景 */
        header {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        
        /* 背景图层 - 备用（本地） */
        .header-bg-local {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("arabian_sky.png") center center / cover no-repeat;
            z-index: 0;
        }
        
        /* 背景图层 - CDN（优先） */
            opacity: 1;
        }
        
        /* 渐变遮罩 */
        .header-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.7) 100%);
            z-index: 2;
        }
        
        .header-content {
            position: relative;
            z-index: 3;
            padding: 2rem 1.5rem;
        }
        
        .arabic-title {
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            margin-bottom: 0.8rem;
            opacity: 0.9;
        }
        
        h1 {
            font-size: clamp(2.5rem, 12vw, 6rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.8rem;
        }
        
        .subtitle {
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        
        .theme-text {
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 0.6rem 1.5rem;
            display: inline-block;
            letter-spacing: 0.15em;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 0.85rem;
            animation: bounce 2s infinite;
            opacity: 0.8;
            z-index: 3;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
        
        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.2rem;
        }
        
        section { margin-bottom: 3rem; }
        
        h2 {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            color: var(--gold);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 0;
            width: 50px; height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .info-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5rem;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .info-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        
        .info-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        
        .info-card h3 {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }
        
        .info-card p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        
        .product-card {
            background: linear-gradient(145deg, #1a1a1a, #141414);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .product-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        
        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }
        
        .product-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .product-name { font-size: 0.95rem; color: var(--text-light); margin-bottom: 0.3rem; }
        .product-price { color: var(--gold); font-size: 1.2rem; font-weight: 700; }
        .product-desc { color: var(--text-muted); font-size: 0.75rem; margin-top: 0.3rem; }
        
        .activity-section {
            background: linear-gradient(145deg, #1a1410, #0f0f0f);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .activity-title {
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .activity-rules {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .rule-box {
            background: rgba(212, 175, 55, 0.05);
            border-left: 3px solid var(--gold);
            padding: 1rem;
        }
        
        .rule-box h4 { color: var(--gold); margin-bottom: 0.8rem; font-size: 1rem; }
        .rule-box ul { list-style: none; color: var(--text-muted); font-size: 0.9rem; }
        .rule-box li { padding: 0.4rem 0 0.4rem 1.2rem; position: relative; }
        .rule-box li::before { content: '◆'; position: absolute; left: 0; color: var(--gold); font-size: 0.6rem; }
        
        .team-section { text-align: center; margin-top: 1.5rem; }
        .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
        
        .team-member {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1rem;
            transition: all 0.3s ease;
        }
        
        .team-member:hover { border-color: var(--gold); transform: translateY(-3px); }
        .team-role { color: var(--gold); font-size: 0.8rem; margin-bottom: 0.3rem; }
        .team-name { font-size: 1rem; color: var(--text-light); }
        
        footer {
            background: linear-gradient(to top, #050505, #0a0a0a);
            padding: 2rem 1.2rem;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .footer-text { color: var(--text-muted); font-size: 0.85rem; line-height: 1.8; }
        .footer-text span { color: var(--gold); }
        .contact-info { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .contact-item { display: block; margin: 0.5rem 0; color: var(--text-muted); font-size: 0.85rem; }
        .contact-item strong { color: var(--gold); }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            header { min-height: 90vh; }
            .header-content { padding: 1.5rem 1rem; }
            .arabic-title { font-size: 1rem; margin-bottom: 0.5rem; }
            h1 { margin-bottom: 0.5rem; }
            .subtitle { margin-bottom: 1rem; }
            .theme-text { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
            .scroll-hint { bottom: 1rem; font-size: 0.75rem; }
            main { padding: 2rem 1rem; }
            section { margin-bottom: 2.5rem; }
            h2 { font-size: 1.4rem; margin-bottom: 1.2rem; }
            .info-grid { grid-template-columns: 1fr; gap: 0.8rem; }
            .info-card { padding: 1.2rem; }
            .info-card h3 { font-size: 1rem; }
            .info-card p { font-size: 0.9rem; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .product-card { padding: 0.8rem; }
            .product-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
            .product-name { font-size: 0.85rem; }
            .product-price { font-size: 1.1rem; }
            .product-desc { font-size: 0.7rem; }
            .activity-section { padding: 1.2rem; }
            .activity-title { font-size: 1.2rem; }
            .rule-box { padding: 0.8rem; }
            .rule-box h4 { font-size: 0.95rem; }
            .rule-box ul { font-size: 0.85rem; }
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .team-member { padding: 0.8rem; }
            .team-role { font-size: 0.75rem; }
            .team-name { font-size: 0.9rem; }
            footer { padding: 1.5rem 1rem; }
            .footer-text { font-size: 0.8rem; }
            .contact-item { font-size: 0.8rem; }
        }
        
        @media (max-width: 374px) {
            h1 { font-size: 2.2rem; }
            .products-grid { grid-template-columns: 1fr; }
            .team-grid { grid-template-columns: 1fr; }
        }
        
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-bg-local"></div>
        };
