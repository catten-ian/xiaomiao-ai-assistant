<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charade 双人测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;min-height:100vh;color:#fff}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:24px;margin-bottom:20px;color:#e94560;text-align:center}
.player-box{background:#16213e;border-radius:12px;padding:20px;margin-bottom:20px}
.player-box h2{font-size:16px;color:#0f3460;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #0f3460}
.player-box.active{border:2px solid #e94560}
.row{display:flex;gap:10px;margin:10px 0}
input,button{padding:10px 16px;border-radius:6px;border:none;font-size:14px}
input{flex:1;background:#0f3460;color:#fff;border:1px solid #1a1a2e}
button{background:#e94560;color:#fff;cursor:pointer;min-width:100px}
button:hover{background:#c73e54}
button:disabled{background:#555;cursor:not-allowed}
button.secondary{background:#0f3460}
button.secondary:hover{background:#16213e}
pre{background:#0f3460;padding:12px;border-radius:6px;margin:10px 0;white-space:pre-wrap;font-size:13px;max-height:200px;overflow-y:auto}
.word-option{display:inline-block;padding:12px 20px;margin:5px;background:#0f3460;border-radius:8px;cursor:pointer;transition:all 0.2s}
.word-option:hover{background:#e94560;transform:scale(1.05)}
.word-option.selected{background:#4CAF50}
.status{padding:8px 16px;border-radius:20px;font-size:12px;display:inline-block;margin:5px}
.status.waiting{background:#ff9800}
.status.playing{background:#4CAF50}
.status.offline{background:#f44336}
.game-area{background:#0f3460;border-radius:12px;padding:20px;min-height:150px;margin:10px 0}
.message{padding:10px;margin:5px 0;border-radius:6px}
.message.info{background:#1a1a2e}
.message.success{background:#2e7d32}
.message.error{background:#c62828}
</style>
</head>
<body>
<div class="container">
<h1>🎮 Charade 双人测试</h1>

<div class="row">
<div class="player-box" id="player1Box" style="flex:1">
<h2>玩家 1 <span class="status offline" id="p1Status">离线</span></h2>
<input type="text" id="p1Name" placeholder="输入用户名" value="玩家A">
<button onclick="login(1)">登录</button>
<button onclick="createRoom(1)" class="secondary" id="p1CreateBtn" disabled>创建房间</button>
<button onclick="joinRoom(1)" class="secondary" id="p1JoinBtn" disabled>加入房间</button>
<pre id="p1Log">等待登录...</pre>
</div>

<div class="player-box" id="player2Box" style="flex:1">
<h2>玩家 2 <span class="status offline" id="p2Status">离线</span></h2>
<input type="text" id="p2Name" placeholder="输入用户名" value="玩家B">
<button onclick="login(2)">登录</button>
<button onclick="createRoom(2)" class="secondary" id="p2CreateBtn" disabled>创建房间</button>
<button onclick="joinRoom(2)" class="secondary" id="p2JoinBtn" disabled>加入房间</button>
<pre id="p2Log">等待登录...</pre>
</div>
</div>

<div class="player-box" id="gameBox">
<h2>游戏区域</h2>
<div class="game-area" id="gameArea">
<p style="color:#888;text-align:center;padding:50px">等待玩家匹配...</p>
</div>
</div>
</div>

<script>
const API = 'https://www.catten.cyou/';
let players = {
1: {id: null, name: '', room: null, role: null, pollInterval: null},
2: {id: null, name: '', room: null, role: null, pollInterval: null}
};

async function post(url, data = {}) {
const res = await fetch(API + url, {
method: 'POST',
headers: {'Content-Type': 'application/x-www-form-urlencoded'},
body: Object.entries(data).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&')
});
return res.json();
}

async function get(url) {
const res = await fetch(API + url);
return res.json();
}

function log(player, msg) {
const el = document.getElementById('p' + player + 'Log');
el.textContent = msg;
}

function setStatus(player, status) {
const el = document.getElementById('p' + player + 'Status');
el.textContent = status;
el.className = 'status ' + (status === '游戏中' ? 'playing' : status === '等待中' ? 'waiting' : 'offline');
}

async function login(player) {
const name = document.getElementById('p' + player + 'Name').value.trim();
if (!name) return alert('请输入用户名');

players[player].name = name;
log(player, '登录中...');

try {
const data = await post('login_only.php', {username: name});
if (data.ret_code === 0) {
players[player].id = data.user_id;
setStatus(player, '在线');
log(player, `✅ 登录成功\nID: ${data.user_id}\n用户名: ${data.username}`);

document.getElementById('p' + player + 'CreateBtn').disabled = false;
document.getElementById('p' + player + 'JoinBtn').disabled = false;

if (data.in_room) {
players[player].room = data.room_id;
setStatus(player, data.room_status === 2 ? '游戏中' : '等待中');
log(player, `已在房间: ${data.room}\n对手: ${data.rival}`);
if (data.room_status === 2) {
startGame(player, data);
}
}
} else {
log(player, '❌ ' + (data.error || '登录失败'));
}
} catch (e) {
log(player, '❌ 错误: ' + e.message);
}
}

async function createRoom(player) {
log(player, '创建房间中...');

try {
const data = await post('create_room.php', {username: players[player].name});
if (data.ret_code >= 0) {
players[player].room = data.room_id;
setStatus(player, '等待中');
log(player, `✅ 房间已创建\n房间: ${data.room}\nID: ${data.room_id}\n等待对手加入...`);

// 开始轮询检查对手
startPolling(player);
} else {
log(player, '❌ ' + (data.error || '创建失败'));
}
} catch (e) {
log(player, '❌ 错误: ' + e.message);
}
}

async function joinRoom(player) {
log(player, '查找房间中...');

try {
const data = await post('paring_v2.php', {username: players[player].name});
if (data.ret_code === 0) {
players[player].room = data.room_id;
setStatus(player, '游戏中');
log(player, `✅ 加入成功\n房间: ${data.room}\n对手: ${data.rival}\n角色: ${data.role}`);
startGame(player, data);
} else if (data.ret_code === 2) {
players[player].room = data.room_id;
setStatus(player, '游戏中');
log(player, `已在房间: ${data.room}\n对手: ${data.rival}`);
startGame(player, data);
} else {
log(player, '❌ 没有可加入的房间，请先让另一个玩家创建房间');
}
} catch (e) {
log(player, '❌ 错误: ' + e.message);
}
}

function startPolling(player) {
if (players[player].pollInterval) {
clearInterval(players[player].pollInterval);
}

players[player].pollInterval = setInterval(async () => {
try {
const data = await get('check_room_status_v2.php?room_id=' + players[player].room);
if (data.has_opponent && data.room_status === 2) {
clearInterval(players[player].pollInterval);
setStatus(player, '游戏中');
log(player, `✅ 对手已加入: ${data.rival}\n角色: ${data.role}`);
startGame(player, data);
}
} catch (e) {
console.error('轮询错误:', e);
}
}, 2000);
}

async function startGame(player, data) {
const gameArea = document.getElementById('gameArea');
const role = data.role || 'describer';

if (role === 'describer') {
// 描述者：选择词语
gameArea.innerHTML = `
<h3>你是描述者</h3>
<p>对手: ${data.rival}</p>
<p>请从以下词语中选择一个进行描述：</p>
<div id="wordOptions" style="margin:15px 0">加载词语中...</div>
<button onclick="confirmWord(${player})" id="confirmBtn" disabled>确认选择</button>
<pre id="gameLog"></pre>
`;

// 获取词语
const wordsData = await get('get_words.php');
if (wordsData.ret_code === 0) {
let html = '';
wordsData.words.forEach((w, i) => {
html += `<span class="word-option" onclick="selectWord(${player}, ${w.id}, '${w.word}')" id="word${w.id}">${w.word}</span> `;
});
document.getElementById('wordOptions').innerHTML = html;
}

} else {
// 猜测者：等待描述
gameArea.innerHTML = `
<h3>你是猜测者</h3>
<p>对手: ${data.rival}</p>
<p>等待描述者选择词语...</p>
<pre id="gameLog">准备中...</pre>
`;

// 开始轮询获取描述
startGuessingPoll(player);
}
}

let selectedWordId = null;
let selectedWord = null;

function selectWord(player, wordId, word) {
// 清除之前的选择
document.querySelectorAll('.word-option').forEach(el => el.classList.remove('selected'));
document.getElementById('word' + wordId).classList.add('selected');
selectedWordId = wordId;
selectedWord = word;
document.getElementById('confirmBtn').disabled = false;
}

async function confirmWord(player) {
if (!selectedWordId) return;

document.getElementById('gameLog').textContent = '保存词语中...';

try {
const data = await post('save_word.php', {room_id: players[player].room, word_id: selectedWordId});
if (data.ret_code === 0) {
document.getElementById('gameLog').textContent = `✅ 已选择: ${selectedWord}\n\n请描述这个词（不能直接说出词语）`;

// 显示描述输入框
document.getElementById('gameArea').innerHTML = `
<h3>描述词语: ${selectedWord}</h3>
<p>请描述这个词，让猜测者能猜出来（不能直接说出词语）</p>
<textarea id="description" style="width:100%;height:80px;background:#1a1a2e;color:#fff;border:1px solid #0f3460;border-radius:6px;padding:10px;margin:10px 0" placeholder="输入你的描述..."></textarea>
<button onclick="sendDescription(${player})">发送描述</button>
<pre id="gameLog"></pre>
`;
}
} catch (e) {
document.getElementById('gameLog').textContent = '错误: ' + e.message;
}
}

async function sendDescription(player) {
const desc = document.getElementById('description').value.trim();
if (!desc) return alert('请输入描述');

document.getElementById('gameLog').textContent = '描述已发送！等待猜测者回答...';

// 保存描述到房间（简化：直接显示结果）
document.getElementById('gameArea').innerHTML = `
<h3>等待猜测</h3>
<p>你的描述: ${desc}</p>
<p>等待猜测者回答...</p>
<pre id="gameLog">等待中...</pre>
`;
}

function startGuessingPoll(player) {
const pollInterval = setInterval(async () => {
try {
const data = await get('get_current_word.php?room_id=' + players[player].room);
if (data.word_id) {
clearInterval(pollInterval);
// 显示猜测界面
document.getElementById('gameArea').innerHTML = `
<h3>猜测词语</h3>
<p>描述者已选择词语，请等待描述...</p>
<textarea id="descDisplay" style="width:100%;height:60px;background:#1a1a2e;color:#fff;border:1px solid #0f3460;border-radius:6px;padding:10px;margin:10px 0" readonly placeholder="等待描述..."></textarea>
<input type="text" id="guess" style="width:100%;padding:10px;background:#1a1a2e;color:#fff;border:1px solid #0f3460;border-radius:6px;margin:10px 0" placeholder="输入你的猜测">
<button onclick="submitGuess(${player})">提交猜测</button>
<pre id="gameLog"></pre>
`;

// 这里应该轮询获取描述，简化处理
document.getElementById('descDisplay').value = '描述者正在描述...（实际应通过WebSocket实时同步）';
}
} catch (e) {
console.error('轮询错误:', e);
}
}, 2000);
}

async function submitGuess(player) {
const guess = document.getElementById('guess').value.trim();
if (!guess) return alert('请输入猜测');

document.getElementById('gameLog').textContent = `你的猜测: ${guess}\n\n等待验证...`;

// 简化：直接调用AI验证
const data = await get('ai_player.php?action=guess&description=' + encodeURIComponent('用户猜测: ' + guess));
document.getElementById('gameLog').textContent = `你的猜测: ${guess}\n\n系统提示: 实际游戏需要真人验证`;
}
</script>
</body>
</html>
