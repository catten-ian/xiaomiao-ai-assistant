<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charade 双人测试 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;min-height:100vh;color:#fff;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px;color:#e94560;text-align:center}
.players{display:flex;gap:20px;margin-bottom:20px}
.player-box{flex:1;background:#16213e;border-radius:12px;padding:20px}
.player-box h2{font-size:16px;color:#0f3460;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #0f3460}
.player-box.active{border:2px solid #e94560}
input,button,textarea{padding:10px 16px;border-radius:6px;border:none;font-size:14px;width:100%;margin:5px 0}
input,textarea{background:#0f3460;color:#fff;border:1px solid #1a1a2e}
button{background:#e94560;color:#fff;cursor:pointer}
button:hover{background:#c73e54}
button:disabled{background:#555;cursor:not-allowed}
button.secondary{background:#0f3460}
pre{background:#0f3460;padding:12px;border-radius:6px;margin:10px 0;white-space:pre-wrap;font-size:12px;max-height:150px;overflow-y:auto}
.word-btn{display:inline-block;padding:12px 20px;margin:5px;background:#0f3460;border-radius:8px;cursor:pointer}
.word-btn:hover{background:#e94560}
.word-btn.selected{background:#4CAF50}
.status{padding:4px 12px;border-radius:12px;font-size:12px;display:inline-block}
.status.online{background:#4CAF50}
.status.waiting{background:#ff9800}
.status.playing{background:#2196F3}
.game-info{background:#0f3460;border-radius:12px;padding:20px;margin-top:20px}
.round-info{font-size:18px;color:#e94560;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<h1>🎮 Charade 双人测试 v2</h1>
<div class="round-info" id="roundInfo">第 1 轮</div>

<div class="players">
<div class="player-box" id="player1Box">
<h2>玩家 1 <span class="status" id="p1Status">离线</span></h2>
<input type="text" id="p1Name" placeholder="用户名" value="玩家A">
<button onclick="login(1)">登录</button>
<button onclick="createRoom(1)" class="secondary" id="p1CreateBtn" disabled>创建房间</button>
<button onclick="joinRoom(1)" class="secondary" id="p1JoinBtn" disabled>加入房间</button>
<pre id="p1Log">等待登录...</pre>
<div id="p1Game"></div>
</div>

<div class="player-box" id="player2Box">
<h2>玩家 2 <span class="status" id="p2Status">离线</span></h2>
<input type="text" id="p2Name" placeholder="用户名" value="玩家B">
<button onclick="login(2)">登录</button>
<button onclick="createRoom(2)" class="secondary" id="p2CreateBtn" disabled>创建房间</button>
<button onclick="joinRoom(2)" class="secondary" id="p2JoinBtn" disabled>加入房间</button>
<pre id="p2Log">等待登录...</pre>
<div id="p2Game"></div>
</div>
</div>

<div class="game-info">
<h3>游戏说明</h3>
<p>1. 玩家A登录 → 创建房间 → 等待</p>
<p>2. 玩家B登录 → 加入房间 → 开始游戏</p>
<p>3. 描述者选词并描述，猜测者猜词</p>
<p>4. 完成后点击"下一轮"继续测试</p>
</div>
</div>

<script>
const API = 'https://www.catten.cyou/';
let players = {
1: {id: null, name: '', room: null, role: null, word: null},
2: {id: null, name: '', room: null, role: null, word: null}
};
let currentRound = 1;
let gameResults = [];

async function post(url, data = {}) {
const res = await fetch(API + url, {
method: 'POST',
headers: {'Content-Type': 'application/x-www-form-urlencoded'},
body: Object.entries(data).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&')
});
return res.json();
}

async function get(url) {
const res = await fetch(API + url);
return res.json();
}

function log(p, msg) {
document.getElementById('p' + p + 'Log').textContent = msg;
}

function setStatus(p, s) {
const el = document.getElementById('p' + p + 'Status');
el.textContent = s;
el.className = 'status ' + (s === '游戏中' ? 'playing' : s === '等待中' ? 'waiting' : 'online');
}

async function login(player) {
const name = document.getElementById('p' + player + 'Name').value.trim();
if (!name) return alert('请输入用户名');

players[player].name = name;
log(player, '登录中...');

try {
const data = await post('login_only.php', {username: name});
if (data.ret_code === 0) {
players[player].id = data.user_id;
setStatus(player, '在线');
log(player, `✅ 登录成功\nID: ${data.user_id}`);
document.getElementById('p' + player + 'CreateBtn').disabled = false;
document.getElementById('p' + player + 'JoinBtn').disabled = false;
} else {
log(player, '❌ ' + (data.error || '失败'));
}
} catch (e) {
log(player, '❌ ' + e.message);
}
}

async function createRoom(player) {
log(player, '创建房间...');

try {
const data = await post('create_room.php', {username: players[player].name});
if (data.ret_code >= 0) {
players[player].room = data.room_id;
setStatus(player, '等待中');
log(player, `✅ 房间: ${data.room}\nID: ${data.room_id}\n等待对手...`);

// 开始轮询
pollOpponent(player);
} else {
log(player, '❌ ' + (data.error || '失败'));
}
} catch (e) {
log(player, '❌ ' + e.message);
}
}

async function pollOpponent(player) {
const poll = setInterval(async () => {
try {
const data = await get(`check_room_status_v2.php?room_id=${players[player].room}&user_id=${players[player].id}`);
if (data.has_opponent && data.room_status === 2) {
clearInterval(poll);
setStatus(player, '游戏中');
players[player].role = data.role;
log(player, `✅ 对手: ${data.rival}\n角色: ${data.role === 'describer' ? '描述者' : '猜测者'}`);
startGame(player, data);
}
} catch (e) {}
}, 1500);
}

async function joinRoom(player) {
log(player, '查找房间...');

try {
const data = await post('paring_v2.php', {username: players[player].name});
if (data.ret_code === 0) {
players[player].room = data.room_id;
players[player].role = data.role;
setStatus(player, '游戏中');
log(player, `✅ 加入成功\n房间: ${data.room}\n对手: ${data.rival}\n角色: ${data.role === 'describer' ? '描述者' : '猜测者'}`);
startGame(player, data);
} else {
log(player, '❌ 没有可加入的房间');
}
} catch (e) {
log(player, '❌ ' + e.message);
}
}

async function startGame(player, data) {
const gameDiv = document.getElementById('p' + player + 'Game');
const role = data.role;

if (role === 'describer') {
gameDiv.innerHTML = `
<h3>你是描述者</h3>
<p>选择一个词：</p>
<div id="words${player}">加载中...</div>
<button onclick="confirmWord(${player})" id="confirmBtn${player}" disabled>确认</button>
`;

const wordsData = await get('get_words.php');
if (wordsData.ret_code === 0) {
let html = '';
wordsData.words.forEach(w => {
html += `<span class="word-btn" onclick="selectWord(${player}, ${w.id}, '${w.word}')" id="w${player}_${w.id}">${w.word}</span> `;
});
document.getElementById('words' + player).innerHTML = html;
}
} else {
gameDiv.innerHTML = `
<h3>你是猜测者</h3>
<p>等待描述者选词...</p>
<div id="desc${player}">-</div>
<input type="text" id="guess${player}" placeholder="输入猜测" style="display:none">
<button onclick="submitGuess(${player})" id="guessBtn${player}" style="display:none">提交</button>
`;

// 轮询获取词语状态
pollWord(player);
}
}

let selectedWord = {};

function selectWord(player, wordId, word) {
document.querySelectorAll(`#words${player} .word-btn`).forEach(el => el.classList.remove('selected'));
document.getElementById('w' + player + '_' + wordId).classList.add('selected');
selectedWord[player] = {id: wordId, word: word};
document.getElementById('confirmBtn' + player).disabled = false;
}

async function confirmWord(player) {
if (!selectedWord[player]) return;

const data = await post('save_word.php', {room_id: players[player].room, word_id: selectedWord[player].id});
if (data.ret_code === 0) {
players[player].word = selectedWord[player].word;
document.getElementById('p' + player + 'Game').innerHTML = `
<h3>词语: ${selectedWord[player].word}</h3>
<p>请描述这个词（不能说出词语）：</p>
<textarea id="descInput${player}" rows="3" placeholder="输入描述..."></textarea>
<button onclick="sendDesc(${player})">发送描述</button>
`;
}
}

async function sendDesc(player) {
const desc = document.getElementById('descInput' + player).value.trim();
if (!desc) return alert('请输入描述');

document.getElementById('p' + player + 'Game').innerHTML = `
<h3>描述已发送</h3>
<p>你的描述: ${desc}</p>
<p>等待猜测者回答...</p>
<button onclick="nextRound(${player})">下一轮</button>
`;

// 保存结果
gameResults.push({round: currentRound, describer: players[player].name, word: players[player].word, description: desc});
}

async function pollWord(player) {
const poll = setInterval(async () => {
try {
const data = await get(`check_room_status_v2.php?room_id=${players[player].room}&user_id=${players[player].id}`);
if (data.current_word) {
clearInterval(poll);
document.getElementById('desc' + player).innerHTML = `<p>描述者已选词，等待描述...</p>`;
}
} catch (e) {}
}, 1500);
}

async function submitGuess(player) {
const guess = document.getElementById('guess' + player).value.trim();
if (!guess) return;

document.getElementById('p' + player + 'Game').innerHTML = `
<h3>你的猜测: ${guess}</h3>
<button onclick="nextRound(${player})">下一轮</button>
`;
}

async function nextRound(player) {
currentRound++;
document.getElementById('roundInfo').textContent = `第 ${currentRound} 轮`;

if (currentRound > 3) {
alert('测试完成！共完成3轮游戏。');
document.getElementById('p1Game').innerHTML = '<h3>测试完成</h3>';
document.getElementById('p2Game').innerHTML = '<h3>测试完成</h3>';
return;
}

// 重置房间
await sshpass -p '6Cj.@H7QQYcgyq-E' ssh root@217.69.4.85 "mariadb -u charade -ppwdtest1 -P 3307 charade -e 'UPDATE tb_room SET status=4 WHERE id=${players[player].room};'";

// 重新开始
document.getElementById('p1Game').innerHTML = '';
document.getElementById('p2Game').innerHTML = '';
log(1, '准备下一轮...');
log(2, '准备下一轮...');
}
</script>
</body>
</html>
